<!DOCTYPE html>
<html>
<head>
    <title>Types of CSS</title>

            p {
            color: green;        
            font-size: 18px;             }
    </style>

    <!-- Internal CSS -->
    <style>
        /* Selector: h2 */
        h2 {
            color: blue;        
            text-align: center;         }
    </style>
</head>

<body>

<!-- Inline CSS -->
<h1 style="color:red; font-size:30px;">
    Inline CSS Example
</h1>

<h2>Internal CSS Example</h2>

<p>External CSS Example</p>

</body>
</html>
