<!DOCTYPE html>
<html>
<head>
<title>Loops Example</title>
</head>

<body>

<h2>Printing Numbers from 1 to 10</h2>

<script>

// Using for loop
document.write("<b>Using for loop:</b><br>");
for(let i = 1; i <= 10; i++) {
    document.write(i + "<br>");
}

// Using while loop
document.write("<br><b>Using while loop:</b><br>");
let j = 1;
while(j <= 10) {
    document.write(j + "<br>");
    j++;
}

// Using do-while loop
document.write("<br><b>Using do-while loop:</b><br>");
let k = 1;
do {
    document.write(k + "<br>");
    k++;
} while(k <= 10);

</script>

</body>
</html>
