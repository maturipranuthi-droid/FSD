 <!DOCTYPE html>
<html>
<head>
    <title>Internal and External JavaScript with Alert</title>

    <!--  Internal JavaScript -->
    <script>
        function showInternalAlert() {
            alert("This alert is from Internal JavaScript!");
        }
    </script>
</head>
<body style="text-align:center; font-family: Arial;">

    <h2>Internal JavaScript Alert</h2>
    <button onclick="showInternalAlert()">Click Internal JS Alert</button>

    <h2>External JavaScript Alert</h2>
    <button onclick="showExternalAlert()">Click External JS Alert</button>

    <!-- External JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
