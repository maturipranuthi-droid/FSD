<!DOCTYPE html>
<html>
<head>
    <title>Doraemon CSS Font & Text Effects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            padding: 30px;
        }

        .card {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* i. font-size */
        .size {
            font-size: 28px;
            color: #1976d2;
        }

        /* ii. font-weight */
        .weight {
            font-weight: bold;
            color: #0d47a1;
        }

        /* iii. font-style */
        .style {
            font-style: italic;
            color: #388e3c;
        }

        /* iv. text-decoration */
        .decoration {
            text-decoration: underline;
            color: #d32f2f;
        }

        /* v. text-transform */
        .transform {
            text-transform: uppercase;
            color: #f57c00;
        }

        /* vi. text-align */
        .align {
            text-align: center;
            background: #e1f5fe;
            padding: 10px;
            border-radius: 8px;
            color: #01579b;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 class="size">Doraemon is my favorite cartoon character</h2>
        <p class="weight">Doraemon is very strong and kind</p>
        <p class="style">Doraemon helps Nobita in every problem</p>
        <p class="decoration">Doraemon comes from the future</p>
        <p class="transform">Doraemon gadgets are amazing</p>
        <p class="align">I love watching Doraemon </p>
    </div>

</body>
</html>
