<!DOCTYPE html>
<html>
<head>
<title>Week Days Program</title>
</head>

<body>

<h2>Display Week Days</h2>

<script>

let day = parseInt(prompt("Enter a number (1-7):"));

switch(day)
{
    case 1:
        alert("Monday");
        break;

    case 2:
        alert("Tuesday");
        break;

    case 3:
        alert("Wednesday");
        break;

    case 4:
        alert("Thursday");
        break;

    case 5:
        alert("Friday");
        break;

    case 6:
        alert("Saturday");
        break;

    case 7:
        alert("Sunday");
        break;

    default:
        alert("Invalid input");
}

</script>

</body>
</html>
