<!DOCTYPE html>
<html>
<head>
<title>Bank Denomination</title>
</head>

<body>

<h2>Bank Amount Denomination</h2>

<script>

let amount = parseInt(prompt("Enter the deposited amount:"));

let hundreds = Math.floor(amount / 100);
amount = amount % 100;

let fifties = Math.floor(amount / 50);
amount = amount % 50;

let twenties = Math.floor(amount / 20);
amount = amount % 20;

let tens = Math.floor(amount / 10);
amount = amount % 10;

let fives = Math.floor(amount / 5);
amount = amount % 5;

let twos = Math.floor(amount / 2);
amount = amount % 2;

let ones = amount;

document.write("Denominations:<br>");
document.write(hundreds + " - 100's<br>");
document.write(fifties + " - 50's<br>");
document.write(twenties + " - 20's<br>");
document.write(tens + " - 10's<br>");
document.write(fives + " - 5's<br>");
document.write(twos + " - 2's<br>");
document.write(ones + " - 1's<br>");

</script>

</body>
</html>
